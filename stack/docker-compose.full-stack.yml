---
services:

    aiidalab:
        image: ${REGISTRY:-}${FULL_STACK_IMAGE:-aiidalab/full-stack}${VERSION:-}
        environment:
            TZ: Europe/Zurich
            SETUP_DEFAULT_AIIDA_PROFILE: 'true'
        volumes:
            - aiidalab-home-folder:/home/jovyan
        healthcheck:
            test: ["CMD-SHELL", "/etc/jupyter/docker_healthcheck.py || exit 1"]
            interval: 5s
            timeout: 5s
            retries: 30
            start_period: 30s
        ports:
            - "0.0.0.0:${AIIDALAB_PORT:-8888}:8888"

volumes:
    aiidalab-home-folder:
