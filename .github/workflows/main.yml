---
name: Docker

on:
    pull_request:
        paths-ignore:
            - "**.md"
            - ruff.toml
            - bumpver.toml
            - .pre-commit-config.yaml
            # We use doit only for local builds
            - dodo.py
    push:
        branches:
            - main
        tags:
            - "v*"

# https://docs.github.com/en/actions/using-jobs/using-concurrency
concurrency:
    # only cancel in-progress jobs or runs for the current workflow - matches against branch & tags
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

env:
    FORCE_COLOR: 1

jobs:

    build-x86:
        uses: ./.github/workflows/build.yml
        with:
            runsOn: ubuntu-22.04
            platforms: linux/amd64

    build-arm:
        uses: ./.github/workflows/build.yml
        with:
            runsOn: ubuntu-22.04-arm
            platforms: linux/arm64

    test-x86:
        needs: build-x86
        strategy:
            fail-fast: false
            matrix:
                target: ["base", "lab", "base-with-services", "full-stack"]
        uses: ./.github/workflows/test.yml
        with:
            runsOn: ubuntu-22.04
            images: ${{ needs.build-x86.outputs.images }}
            target: ${{ matrix.target }}
            integration: false

    test-arm:
        needs: build-arm
        strategy:
            fail-fast: false
            matrix:
                target: ["base", "lab", "base-with-services", "full-stack"]
        uses: ./.github/workflows/test.yml
        with:
            runsOn: ubuntu-22.04-arm
            images: ${{ needs.build-arm.outputs.images }}
            target: ${{ matrix.target }}
            integration: false

    build:
        needs: [test-x86, test-arm]
        uses: ./.github/workflows/build.yml
        with:
            runsOn: ubuntu-22.04
            platforms: linux/amd64,linux/arm64

    test-integration:
        name: Integration tests
        needs: build
        strategy:
            fail-fast: false
            matrix:
                runner: [ubuntu-22.04, ubuntu-22.04-arm]
        uses: ./.github/workflows/test.yml
        with:
            runsOn: ${{ matrix.runner }}
            images: ${{ needs.build.outputs.images }}
            target: full-stack
            integration: true

    publish-ghcr:
        needs: [build]
        uses: ./.github/workflows/publish.yml
        with:
            runsOn: ubuntu-22.04
            images: ${{ needs.build.outputs.images }}
            registry: ghcr.io
        secrets: inherit

    publish-dockerhub:
        if: >-
            github.repository == 'aiidalab/aiidalab-docker-stack'
            && (github.ref_type == 'tag' || github.ref_name == 'main')
        needs: [build, test-x86, test-arm, publish-ghcr]
        uses: ./.github/workflows/publish.yml
        with:
            runsOn: ubuntu-22.04
            images: ${{ needs.build.outputs.images }}
            registry: docker.io
        secrets: inherit

    make-release:
        runs-on: ubuntu-22.04
        if: >-
            github.repository == 'aiidalab/aiidalab-docker-stack'
            && github.ref_type == 'tag'
        needs: [publish-dockerhub]

        steps:
            - uses: softprops/action-gh-release@v2
              name: Create release
              with:
                  generate_release_notes: true
